<!--For White Color Card-->
<mat-card
    class="group  backdrop-blur-sm border-gray-200! border-2! shadow-sm! hover:shadow-xl transition-all duration-300 hover:-translate-y-1 rounded-2xl overflow-hidden"
    [ngClass]="hoverBgColor"
    *ngIf="cardWhiteColor"
    style="background-color: rgba(255, 255, 255, 0.966)">
    <mat-card-content class="p-6">
         <!-- Label -->
        <div
            class="text-gray-600! text-xs font-medium mb-1 transition-colors duration-300 ">
            {{ label }}
        </div>
        <!-- Value with optional currency -->
        <div
            class="text-3xl tracking-tight! font-stretch-200%! font-medium!  mb-5! transition-colors duration-300 "
            [ngClass]="valueColor">
            {{ displayValue }}
        </div>

       
        

        <!-- Divider -->
          <div class="  w-53 bg-gray-500 h-px"></div> 

        <!-- Button (optional) -->
        <div class="flex justify-right" *ngIf="showButton">
            <button
                mat-button
                (click)="onButtonClick()"
                class="px-1 py-1! text-xs! cursor-pointer transition-colors " [ngClass]="valueColor">
                {{ buttonLabel }}
            </button>
        </div>
    </mat-card-content>
</mat-card>

<!--For Fixed Color Card-->
<div class="w-[240px] rounded-xl bg-white shadow-sm ring-1 ring-black/5 px-5 py-2" *ngIf="cardFixedColor">
  <div class="flex items-start gap-4 mb-0 mt-1">
    <!-- Material Icon -->
    <div class="h-12 w-12 rounded-lg  flex items-center justify-center shrink-0" [ngClass]="cardBackgroundColor">
      <mat-icon class="text-white! !text-[41px] !leading-none !h-auto !w-auto">
        {{icon}}
      </mat-icon>
    </div>

    <!-- Text -->
   <div class="flex-1 min-w-0 [container-type:inline-size]">
  <p
    class="text-slate-700 leading-tight whitespace-nowrap overflow-hidden text-ellipsis
           text-[clamp(11px,4cqw,12px)]"
    [title]="label"
  >
    {{ label }}
  </p>

  <p class="mt-1 text-xl font-bold text-slate-900 leading-tight" [ngClass]="valueColor">
    {{ displayValue }}
  </p>
</div>


  </div>

  <!-- Divider -->
  <div class="bg-gray-300 h-px mt-0"></div>

  <!-- Footer -->
  <div class="mt-0" *ngIf="showButton">
    <button (click)="onButtonClick()" class="text-xs  hover:underline cursor-pointer" [ngClass]="valueColor">
      View details
    </button>
  </div>
</div>
