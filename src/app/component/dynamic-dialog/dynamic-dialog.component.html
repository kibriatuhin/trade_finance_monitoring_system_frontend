<div *ngIf="show"
     tabindex="-1"
     class="absolute left-0 mt-1 w-96  bg-white border border-gray-300 rounded-md shadow-lg z-20">

  <!-- Header -->
  <div class="px-3 py-1.5 border-b border-gray-200 flex justify-between items-center bg-gray-50">
    <div class="text-xs font-medium text-gray-800">
      {{ title }}
    </div>
    <button
      (click)="onCancel()"
      class="text-gray-400 hover:text-gray-700 text-base leading-none">
      &times;
    </button>
  </div>

  <!-- Table -->
  <div class="max-h-60 overflow-y-auto">
    <table mat-table
           [dataSource]="dataSource"
           class="w-full text-[11px] border-collapse">

      <ng-container *ngFor="let col of columns" [matColumnDef]="col.field">

        <!-- Column Header -->
        <th mat-header-cell
            *matHeaderCellDef
            class="sticky top-0 bg-blue-600! text-white font-semibold
                   px-2   text-left"
            [ngClass]="col.width">
          {{ col.header }}
        </th>

        <!-- Cell -->
        <td mat-cell
            *matCellDef="let row"
            class="px-2 py-0.5 border-b border-gray-200 text-gray-700">
          {{ row[col.field] }}
        </td>

      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr mat-row
          *matRowDef="let row; let i = index; columns: displayedColumns"
          class="cursor-pointer transition-colors
                 hover:bg-blue-50"
          [class.bg-blue-100]="i === hoveredIndex"
          (click)="onSelect(row)">
      </tr>

    </table>
  </div>

  <!-- Paginator -->
  <div class="border-t border-gray-200">
    <mat-paginator
      
      showFirstLastButtons>
    </mat-paginator>
  </div>

  <!-- Footer -->
  <div class="text-[10px] text-gray-500 px-2 py-1 border-t border-gray-200 flex justify-between bg-gray-50">
    <div>↑ ↓ Navigate | Enter Select</div>
    <div>{{ dataSource.filteredData.length }} records</div>
  </div>

</div>
