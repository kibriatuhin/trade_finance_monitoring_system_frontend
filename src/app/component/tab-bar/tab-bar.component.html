<div class="flex bg-gray-200  overflow-x-auto" >
  <div *ngFor="let tab of tabs" 
       class="px-3 py-2 flex items-center cursor-pointer"
       [ngClass]="{ 'bg-gray-100 border-t border-l border-r shadow': tab.isActive }"
       (click)="activate(tab)">
    {{ tab.title }}
    <span class="ml-2 text-gray-500 hover:text-red-600" (click)="close(tab)">×</span>
  </div>
</div>
