<!-- Wrapper -->
<div class="w-full max-w-[920px] rounded-2xl bg-gray-300 shadow-xl ring-1 ring-slate-200 overflow-hidden">
    <!-- Header -->
    <div class="px-7 pt-4 border-b border-slate-200/70 bg-slate-50/60! ">
        <div class="flex items-start justify-between gap-4">
            <div>
                <p class="!text-sm tracking-tight text-slate-900">
                    {{ data.title || 'Details' }}
                </p>

            </div>

            <!-- Top-right close (professional UX) -->
            <button type="button" (click)="close()"
                class="rounded-xl cursor-pointer text-red-500 hover:text-red-700  active:bg-red-200 transition"
                aria-label="Close dialog">
                ✕
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="px-7 py-3 bg-white">
        <div class="space-y-1">
            <div *ngFor="let pair of fieldPairs; trackBy: trackPair"
                class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <!-- Item (left) -->
                <div class="rounded-xl bg-slate-50 border border-slate-200/70 p-2">
                    <div class="grid grid-cols-[100px_1fr] items-start">
                        <div class="text-xs font-semibold text-slate-700">
                            {{ pair[0].label }} :
                        </div>
                        <div class="text-sm text-slate-900 break-words">
                            {{ pair[0].value ?? '-' }}
                        </div>
                    </div>
                </div>

                <!-- Item (right) -->
                <div *ngIf="pair.length > 1" class="rounded-xl bg-slate-50 border border-slate-200/70 p-2">
                    <div class="grid grid-cols-[100px_1fr]  items-start">
                        <div class="text-sm font-semibold text-slate-700">
                            {{ pair[1].label }} :
                        </div>
                        <div class="text-sm text-slate-900 break-words">
                            {{ pair[1].value ?? '-' }}
                        </div>
                    </div>
                </div>

                <!-- If odd fields, keep grid balanced -->
                <div *ngIf="pair.length === 1" class="hidden md:block"></div>
            </div>
        </div>
    </div>
    <!-- Footer -->
    <div class="px-2 py-2 border-t  border-slate-200/70 bg-slate-50/60! rounded-b-2xl flex justify-end gap-3">
        <button type="button" (click)="close()" class="inline-flex items-center justify-center rounded-xl px-2 py-1 text-sm font-semibold cursor-pointer
                 bg-red-500 text-white hover:bg-red-800 active:bg-red-950 transition">
            Close
        </button>
    </div>
</div>
