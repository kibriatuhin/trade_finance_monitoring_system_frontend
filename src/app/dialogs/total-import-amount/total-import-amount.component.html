<div class="w-full max-w-none p-6 md:p-8 bg-white rounded-xl">
    <!-- Dashboard Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 lg:gap-6">
        <!-- Total Trade Volume Card -->
        <mat-card class="bg-blue-950! backdrop-blur-sm border-0 shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-1 rounded-2xl overflow-hidden">
            <mat-card-content class="p-6">
                <div class="text-3xl font-bold text-white mb-2">&#x09F3; N/A</div>
                <div class="text-gray-100 text-xs font-medium mb-3">Total Trade Volume in USD</div>
                <div class="flex flex-row justify-between">
                    <div class="inline-flex items-center px-3 py-1 text-xs rounded-full font-semibold bg-green-100 text-green-700">
                        +12.5% vs last year
                    </div>
                </div>
            </mat-card-content>
        </mat-card>

        <!-- Total O/S Liability Card -->
        <mat-card class="bg-blue-950! backdrop-blur-sm border-0 shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-1 rounded-2xl overflow-hidden">
            <mat-card-content class="p-6">
                <div class="text-3xl font-bold text-white mb-2">&#x09F3; N/A</div>
                <div class="text-gray-100 text-xs font-medium mb-3">Total Trade Volume in Euro</div>
                <div class="flex flex-row justify-between">
                    <div class="inline-flex items-center px-3 py-1 text-xs rounded-full font-semibold bg-green-100 text-green-700">
                        +8.3% vs last year
                    </div>
                </div>
            </mat-card-content>
        </mat-card>

        <!-- Total Payment Amount Card -->
        <mat-card class="bg-blue-950! backdrop-blur-sm border-0 shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-1 rounded-2xl overflow-hidden">
            <mat-card-content class="p-6">
                <div class="text-3xl font-bold text-white mb-2">&#x09F3; N/A</div>
                <div class="text-gray-100 text-xs font-medium mb-3">Total Trade Volume in Rupee</div>
                <div class="flex flex-row justify-between">
                    <div class="inline-flex items-center px-3 py-1 text-xs rounded-full font-semibold bg-green-100 text-green-700">
                        +8.3% vs last year
                    </div>
                </div>
            </mat-card-content>
        </mat-card>

        <!-- Fourth Card -->
        <mat-card class="bg-blue-950! backdrop-blur-sm border-0 shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-1 rounded-2xl overflow-hidden">
            <mat-card-content class="p-6">
                <div class="text-3xl font-bold text-white mb-2">&#x09F3; N/A</div>
                <div class="text-gray-100 text-xs font-medium mb-3">Total Trade Volume in JPY</div>
                <div class="flex flex-row justify-between">
                    <div class="inline-flex items-center px-3 py-1 text-xs rounded-full font-semibold bg-green-100 text-green-700">
                        +8.3% vs last year
                    </div>
                </div>
            </mat-card-content>
        </mat-card>
    </div>

    <!-- Dialog Actions -->
    <mat-dialog-actions align="end" class="mt-8">
        <button mat-raised-button color="primary" [mat-dialog-close]="true" cdkFocusInitial>
            Cancel
        </button>
    </mat-dialog-actions>
</div>
