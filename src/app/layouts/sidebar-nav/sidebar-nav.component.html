<div class=" relative h-full bg-linear-to-r! from-slate-50! via-slate-50! to-slate-50!
         overflow-y-auto overflow-x-hidden border-r border-gray-300 text-xs!">
  <mat-tree [dataSource]="treeDataSource" [treeControl]="treeControl">

    <!-- Parent Node -->
    <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild" class="tree-parent" [class.leaf-like-parent]="isLeafLikeParent(node)"  >
      <div class="parent-wrapping">
        
        <div class="parent-row hover:bg-blue-100!" [ngClass]="{ 'expanded-node': treeControl.isExpanded(node),
       'leaf-row': isLeafLikeParent(node) }"
          (click)="toggleSubmenu(node.id)">

            <!-- horizontal line -->
  <span
    *ngIf="isLeafLikeParent(node)"
    class="leaf-connector parent-leaf-connector">
  </span>
          <div class="flex items-center gap-3 text-sm!">

            <!--rounded-xl bg-linear-to-r! from-cyan-700! via-blue-500! to-indigo-600!-->
            <mat-icon *ngIf="node.icon" 
              class=" text-black! text-xl! w-6! h-6! flex! items-center! justify-center! leading-none!">
              {{ node.icon }}
            </mat-icon>

            <span class="truncate whitespace-nowrap overflow-hidden">{{ node.name }}</span>
          </div>
          <mat-icon class="shrink-0">{{ treeControl.isExpanded(node) ? 'expand_less' :
            'expand_more' }}</mat-icon>
        </div>
      </div>

      <div *ngIf="treeControl.isExpanded(node)" class="children-container  animate-expand ">
        <ng-container matTreeNodeOutlet></ng-container>
      </div>
    </mat-nested-tree-node>

    <mat-tree-node *matTreeNodeDef="let node" class="tree-leaf">
      <span class="leaf-connector"></span>

      <a (click)="openTab(node.tabKey, node.route)" [routerLink]="node.route" routerLinkActive="active-leaf"
        class="leaf-text">
        {{ node.name }}
      </a>
    </mat-tree-node>

  </mat-tree>

</div>
