<div
  class="h-full overflow-y-auto overflow-x-auto border-r border-gray-300 text-xs!">
  <mat-tree [dataSource]="treeDataSource" [treeControl]="treeControl">

    <!-- Parent Node -->
    <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild"
      class="tree-parent">
      <div class="parent-wrapping">
        <div class="parent-row hover:bg-blue-100!"
        (click)="toggleSubmenu(node.id)">
        <div class="flex items-center gap-3 text-sm!">

          <mat-icon
            class="rounded-xl bg-linear-to-r! from-cyan-700! via-blue-500! to-indigo-600! text-white! text-sm! w-6! h-6! flex! items-center! justify-center! leading-none!">
            {{ node.icon }}
          </mat-icon>

          <span>{{ node.name }}</span>
        </div>
        <mat-icon>{{ treeControl.isExpanded(node) ? 'expand_less' :
          'expand_more' }}</mat-icon>
      </div>
      </div>
      

      <div *ngIf="treeControl.isExpanded(node)" class="children-container">
        <ng-container matTreeNodeOutlet></ng-container>
      </div>
    </mat-nested-tree-node>

    <mat-tree-node *matTreeNodeDef="let node" class="tree-leaf">
      <span class="leaf-connector"></span>

      <a (click)="openTab(node.tabKey, node.route)"
        [routerLink]="node.route"
        routerLinkActive="active-leaf"
        class="leaf-text">
        {{ node.name }}
      </a>
    </mat-tree-node>

  </mat-tree>

</div>
