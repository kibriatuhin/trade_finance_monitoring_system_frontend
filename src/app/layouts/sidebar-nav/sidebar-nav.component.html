<div class="relative h-full bg-linear-to-r! from-slate-50! via-slate-50! to-slate-50!
            overflow-y-auto overflow-x-hidden border-r border-gray-300">

  <mat-tree [dataSource]="treeDataSource" [treeControl]="treeControl" class="pro-tree">

    <!-- Parent Node -->
    <mat-nested-tree-node
      *matTreeNodeDef="let node; when: hasChild"
      class="tree-parent"
      [class.leaf-like-parent]="isLeafLikeParent(node)">

      <div class="parent-row"
           [class.is-expanded]="treeControl.isExpanded(node)"
           (click)="toggleSubmenu(node.id)">

        <div class="row-left">
          <mat-icon *ngIf="node.icon" class="node-icon">
            {{ node.icon }}
          </mat-icon>

          <span class="node-label">{{ node.name }}</span>
        </div>

        <!-- Use single icon and rotate -->
        <mat-icon class="chev" [class.rot]="treeControl.isExpanded(node)">
          expand_more
        </mat-icon>
      </div>

      <div *ngIf="treeControl.isExpanded(node)" class="children-container animate-expand">
        <ng-container matTreeNodeOutlet></ng-container>
      </div>

    </mat-nested-tree-node>

    <!-- Leaf Node -->
    <mat-tree-node *matTreeNodeDef="let node" class="tree-leaf">
      <span class="leaf-connector"></span>

      <a (click)="openTab(node.tabKey, node.route)"
         [routerLink]="node.route"
         routerLinkActive="active-leaf"
         class="leaf-text">
        {{ node.name }}
      </a>
    </mat-tree-node>

  </mat-tree>
</div>
