<!-- center login card -->

<div class="flex  h-full flex-col justify-center  bg-white px-6 py-12 lg:px-8">


  <div class="sm:mx-auto sm:w-full sm:max-w-sm text-center">
    <img class="mx-auto  h-13 w-auto" src="assets/logo.png" alt="Sonali Intellect" />
    <!-- <h2 class="mt-8 text-2xl font-bold tracking-tight text-gray-900">

      </h2> -->
  </div>


  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <div class="rounded-lg border border-gray-200 bg-white p-6 shadow-sm">

      <form class="space-y-6">


        <div>
          <label for="userId" class="block text-sm font-medium text-gray-700">
            User ID
          </label>
          <div class="mt-2">
            <input id="userId" type="input" name="userId" #userId required autocomplete="email"
              placeholder="enter user id" (keydown)="onKeyDownPress($event, 'password', false)"
              class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-lg block px-3 py-2.5 pr-8 focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
          </div>
        </div>


        <div>
          <div class="flex items-center justify-between">
            <label for="password" class="block text-sm font-medium text-gray-700">
              Password
            </label>

          </div>

          <div class="mt-2 relative">
            <input id="password" [type]="showPassword ? 'text' : 'password'" name="password" required
              autocomplete="current-password" (keydown)="onKeyDownPress($event, 'login', false)" placeholder="••••••••" class="w-full bg-gray-50 border border-gray-300
                     text-gray-900 text-sm rounded-lg block px-3 py-2.5 pr-10
                     focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
          
            <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500"
              (click)="togglePassword()" tabindex="-1">
              <span class="text-xs font-medium flex items-center gap-1">
                <mat-icon *ngIf="!showPassword" class="visibility">visibility</mat-icon>
                <mat-icon *ngIf="showPassword" class="visibility">visibility_off</mat-icon>
          
              </span>
            </button>
          
          </div>

        </div>


        <div>
          <button type="submit" id="login" name="login" (keydown)="onKeyDownPress($event, undefined, true)" class="flex w-full justify-center rounded-md bg-indigo-600 px-4 py-2
                   text-sm font-semibold text-white
                   hover:bg-indigo-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500
                   focus:ring-offset-2">
            Sign in
          </button>
        </div>

      </form>
    </div>

    <p class="mt-6 text-center text-sm text-gray-500">
      <a href="#" class="font-semibold text-indigo-600 hover:text-indigo-500">

      </a>
    </p>
  </div>

</div>
