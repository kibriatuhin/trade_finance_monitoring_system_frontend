<!-- Page wrapper -->
<div class="min-h-screen flex items-center bg-gray-100 justify-center px-4 py-10">
  <div class="origin-center scale-[0.90] md:scale-[0.92] lg:scale-[0.90]">
    <!-- Card -->
    <div class="w-[900px] overflow-hidden rounded-2xl bg-white shadow-[0_18px_60px_-30px_rgba(2,6,23,0.25)]">
      <div class="grid grid-cols-1 md:grid-cols-2">
        <!-- Left illustration -->
        <div class="p-3 md:p-10">
          <img
            src="assets/images/login_demo.svg"
            alt="TF Monitoring"
            class="h-full w-full scale-[0.90] rounded-2xl object-cover"
          />
        </div>

        <!-- Right form -->
        <div class="flex items-center">
          <div class="w-full p-3 md:p-12">
            <p class="text-xl text-slate-900">Sign In with CBS</p>
            <p class="mt-2 text-xs text-slate-500">TF Monitoring &amp; Risk Analysis System</p>

            <form class="mt-8 space-y-6">
              <!-- Username -->
              <div>
                <label class="text-xs font-semibold tracking-wide text-slate-700">USERNAME</label>
                <div class="mt-2 flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-3 py-2.5
                            focus-within:ring-2 focus-within:ring-blue-600/30">
                  <svg class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none">
                    <path d="M20 21a8 8 0 10-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    <path d="M12 13a5 5 0 100-10 5 5 0 000 10z" stroke="currentColor" stroke-width="1.8"
                      stroke-linecap="round" stroke-linejoin="round" />
                  </svg>
                  <input
                  id="userId"
                    type="text"
                    (keydown)="onKeyDownPress($event, 'password', false)"
                    #userId
                    placeholder="Username"
                    class="w-full bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none"
                  />
                </div>
              </div>

              <!-- Password -->
              <div>
                <label class="text-xs font-semibold tracking-wide text-slate-700">PASSWORD</label>

                <div class="mt-2 flex items-center gap-3 rounded-lg border border-slate-200 bg-white px-3 py-2.5
                            focus-within:ring-2 focus-within:ring-blue-600/30">
                  <svg class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none">
                    <path d="M7 11V8a5 5 0 0110 0v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    <path d="M6 11h12a2 2 0 012 2v6a2 2 0 01-2 2H6a2 2 0 01-2-2v-6a2 2 0 012-2z"
                      stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                  </svg>

                  <input
                    type="{{ showPassword ? 'text' : 'password' }}"
                    placeholder="Password"
                    id="password"
                    (keydown)="onKeyDownPress($event, 'login', false)"
                    class="w-full bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none"
                    [(ngModel)]="passwordValue"
                    name="password"
                    (input)="onPasswordInput()"
                  />

                  <!-- Eye toggle: only show when user typed something -->
                  <button
                    *ngIf="passwordValue?.length"
                    type="button"
                    (click)="togglePassword()"
                    class="rounded-md cursor-pointer text-slate-400 hover:text-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-600/30"
                    aria-label="Toggle password visibility"
                  >
                    <!-- eye open (when password hidden) -->
                    <svg *ngIf="!showPassword" class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                      <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>

                    <!-- eye closed (when password visible) -->
                    <svg *ngIf="showPassword" class="h-5 w-5" viewBox="0 0 24 24" fill="none">
                      <path d="M3 3l18 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                      <path d="M10.6 10.6A3 3 0 0012 15a3 3 0 002.4-4.4" stroke="currentColor"
                        stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                      <path d="M6.2 6.2C3.6 8 2 12 2 12s3.5 7 10 7c1.6 0 3-.3 4.2-.8"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                      <path d="M9.9 4.2C10.6 4.1 11.3 4 12 4c6.5 0 10 8 10 8s-1.2 2.7-3.5 4.9"
                        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  </button>
                </div>
              </div>

              <button
                type="submit"
                 id="login"
                 (keydown)="onKeyDownPress($event, undefined, true)"
                class="w-full rounded-lg bg-blue-600 px-4 py-3 text-sm font-semibold text-white shadow-sm
                       hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-red-600/30">
                Sign In
              </button>
            </form>

            <div class="mt-10 hidden md:block"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
